<!--
  Cube Wide + Yellow Horizontal Lines Base
  Same cube geometry as base-solid. Base is the same triangle shape
  but filled with horizontal yellow scan lines — Max Headroom floor aesthetic.

  Base triangle: (32,48) → (8,62) → (56,62)
  Colors: top=green, left=cyan, right=magenta, base=yellow lines on black
-->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="top-bl">
      <polygon points="32,2 56,16 32,30 8,16"/>
    </clipPath>
    <clipPath id="left-bl">
      <polygon points="8,16 32,30 32,48 8,34"/>
    </clipPath>
    <clipPath id="right-bl">
      <polygon points="56,16 56,34 32,48 32,30"/>
    </clipPath>
    <clipPath id="base-bl">
      <polygon points="32,48 8,62 56,62"/>
    </clipPath>
    <!-- Green horizontal lines: top face -->
    <pattern id="top-p-bl" patternUnits="userSpaceOnUse" width="8" height="7">
      <rect width="8" height="4" fill="#00ff00"/>
      <rect y="4" width="8" height="3" fill="#050508"/>
    </pattern>
    <!-- Cyan diagonal ╲: left face -->
    <pattern id="left-p-bl" patternUnits="userSpaceOnUse" width="10" height="10"
             patternTransform="rotate(45 0 0)">
      <rect width="6" height="10" fill="#00bbff"/>
      <rect x="6" width="4" height="10" fill="#050508"/>
    </pattern>
    <!-- Magenta diagonal ╱: right face -->
    <pattern id="right-p-bl" patternUnits="userSpaceOnUse" width="10" height="10"
             patternTransform="rotate(-45 0 0)">
      <rect width="6" height="10" fill="#ff00aa"/>
      <rect x="6" width="4" height="10" fill="#050508"/>
    </pattern>
    <!-- Yellow horizontal lines: base -->
    <pattern id="base-p-bl" patternUnits="userSpaceOnUse" width="8" height="7">
      <rect width="8" height="4" fill="#ffdd00"/>
      <rect y="4" width="8" height="3" fill="#050508"/>
    </pattern>
  </defs>

  <!-- Base triangle background (black) -->
  <polygon points="32,48 8,62 56,62" fill="#050508"/>
  <!-- Yellow lines fill clipped to base triangle -->
  <rect width="64" height="64" fill="url(#base-p-bl)" clip-path="url(#base-bl)"/>

  <!-- Black hexagon background -->
  <polygon points="32,2 56,16 56,34 32,48 8,34 8,16" fill="#050508"/>

  <!-- Face fills -->
  <rect width="64" height="64" fill="url(#top-p-bl)"   clip-path="url(#top-bl)"/>
  <rect width="64" height="64" fill="url(#left-p-bl)"  clip-path="url(#left-bl)"/>
  <rect width="64" height="64" fill="url(#right-p-bl)" clip-path="url(#right-bl)"/>

  <!-- Outer hexagon border -->
  <polygon points="32,2 56,16 56,34 32,48 8,34 8,16"
           fill="none" stroke="#050508" stroke-width="2"/>
  <!-- 3 inner edges only -->
  <line x1="32" y1="30" x2="56" y2="16" stroke="#050508" stroke-width="1.5"/>
  <line x1="32" y1="30" x2="8"  y2="16" stroke="#050508" stroke-width="1.5"/>
  <line x1="32" y1="30" x2="32" y2="48" stroke="#050508" stroke-width="1.5"/>
</svg>
