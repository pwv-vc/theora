<!-- Broadcast tower C: Max-style hazard ribbon + red nameplate + three-tier base. -->
<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="twc-top"><rect x="5" y="5" width="54" height="16" rx="2"/></clipPath>
    <pattern id="twc-hazard" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="#050508"/>
      <rect width="5" height="10" fill="#ffdd00"/>
    </pattern>
  </defs>
  <rect x="3" y="3" width="58" height="58" rx="4" fill="#050508" stroke="#d90429" stroke-width="2"/>
  <g clip-path="url(#twc-top)">
    <rect x="5" y="5" width="54" height="16" fill="url(#twc-hazard)"/>
  </g>
  <rect x="5" y="5" width="54" height="16" rx="2" fill="none" stroke="#e8e8ff" stroke-width="1" opacity="0.25"/>
  <!-- Nameplate -->
  <rect x="8" y="24" width="48" height="22" rx="2" fill="#f8f8ff" stroke="#d90429" stroke-width="2"/>
  <rect x="12" y="30" width="40" height="10" rx="1" fill="#ff00aa"/>
  <line x1="14" y1="35" x2="50" y2="35" stroke="#050508" stroke-width="1" opacity="0.2"/>
  <!-- Bottom tier -->
  <rect x="7" y="48" width="50" height="11" rx="1" fill="#141428"/>
  <rect x="12" y="49" width="9" height="9" rx="1" fill="#e8e8ff"/>
  <rect x="27.5" y="49" width="9" height="9" rx="1" fill="#e8e8ff"/>
  <rect x="43" y="49" width="9" height="9" rx="1" fill="#e8e8ff"/>
</svg>
